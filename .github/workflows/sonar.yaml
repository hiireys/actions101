name: Sonar Scan
on: 
  push: 
    branches: 
      - feature/sonar

concurrency:
   group: ci-${{github.head_ref || github.ref_name}}
   cancel-in-progress: true

permissions:
  contents: read #actions/checkout
  security-events: write #to upload sarif file

jobs:
  sonarJob:
    name: job-name-sonar
    runs-on: self-hosted
    environment: Development
    steps: 
      - name: Checkout
        uses: actions/checkout@v4
        with: 
           sparse-checkout: |
               .snyk
               src/*
               sonar-project.properties
           sparse-checkout-cone-mode: false
      
      # - name: Sonar On Prem Scan
      #   uses: SonarSource/sonarqube-scan-action@v2
      #   env:
      #      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      # - name: Sonar Cloud Scan
      #   uses: SonarSource/sonarqube-scan-action@v2
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_CLOUD_TOKEN }}
      #     SONAR_HOST_URL: ${{ vars.SONAR_CLOUD_HOST_URL }} #sonarcloud.io for cloud else the on prem url
      
      - name: Setup Sonar CLI
        run: |
          curl -o- https://raw.githubusercontent.com/SonarSource/sonarqube-cli/refs/heads/master/user-scripts/install.sh | bash

          sonar auth login -s ${{ vars.SONAR_CLOUD_HOST_URL }} --with-token ${{ secrets.SONAR_CLOUD_TOKEN }}

      - name: Run scan via Sonar CLI
        run: |
          sonar \
          -Dsonar.token=${{ secrets.SONAR_CLOUD_TOKEN }}
          -Dsonar.host.url=${{ vars.SONAR_CLOUD_HOST_URL }}
          -Dsonar.branch.name=${{ github.ref_name }}  