name: CI/CD Pipeline - MAIN
on: 
  push:
    branches: 
       - feature/container-security
    tags: 
  workflow_dispatch:

jobs:
  buildJob:
    # if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: [ ubuntu-latest ]
    steps: 
        - name: Checkout code
          uses: actions/checkout@v3
          with:
             sparse-checkout: 
                app.py
                Dockerfile
                requirements.txt
             sparse-checkout-cone-mode: true
        
        - name: Run trivy scan
          uses: aquasecurity/trivy-action@0.35.0
          with: 
            image-ref: hiireys/actions101:v1
            format: 'table'
            exit-code: 0
            ignore-unifxed: true
            severity: 'CRITICAL,HIGH'
          

