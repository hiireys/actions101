name: CI/CD Pipeline - MAIN
on: 
  push:
    branches: 
       - feature/*
    tags: 
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  buildJob:
    # if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: [ ubuntu-latest ]
    steps: 
        - name: Checkout code
          uses: actions/checkout@v3
          with:
             sparse-checkout: 
                app.py
                Dockerfile
                requirements.txt
             sparse-checkout-cone-mode: true
        
        - name: Run trivy scan
          uses: aquasecurity/trivy-action@0.35.0
          with: 
            image-ref: hiireys/actions101:v2
            format: sarif
            output: trivy-results.sarif
            #exit-code: 1 to fail it but to got to upload step, we need to pass it
            # ignore-unfixed: false
            severity: 'LOW'
        
        - name: Upload SARIF
          uses: github/codeql-action/upload-sarif@v4
          with:
            sarif_file: trivy-results.sarif
          

