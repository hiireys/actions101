name: trivy

on:
  push:
    branches: [ "feature/*" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ] #target branch the PR raised for
  # schedule:
  #   - cron: '43 17 * * 1'

permissions:
  contents: read

jobs:
  summary:
    runs-on: ubuntu-latest
    ACTIONS_STEP_DEBUG: true
    steps:
      - name: Generate Summary
        run: | 
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success " >> $GITHUB_STEP_SUMMARY
    
  build:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Build
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Build an image from Dockerfile
      #   run: |
      #     docker build -t hiireys/actions101:v1

      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
      #   with:
      #     image-ref: 'hiireys/actions101:v1'
      #     format: 'template'
      #     template: '@/contrib/sarif.tpl'
      #     output: 'trivy-results.sarif'
      #     severity: 'CRITICAL,HIGH'

      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: 'trivy-results.sarif'
    
      # - name: Upload report      #Runner page gets the report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: trivy-report
      #     path: trivy-results.sarif

      - name: Run Trivy vulnerability Scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: hiireys/actions101:v1
          ignore-unfixed: true
          format: 'table'
          exit-code: 1
          output: trivy-report.txt
          severity: 'CRITICAL,HIGH'

      - name: Upload to runner to download from Actions tab
        #if: Always() #it will always run although previous steps failed
        uses: actions/upload-artifact@v4
        with: 
          name: trivy-report.txt
          path: trivy-report.txt

#output-->
